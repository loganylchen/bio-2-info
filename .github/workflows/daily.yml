name: daily
# 每日一次：feed（抓取+LLM精筛）→ archive（selected→IMA→推一条合并 Telegram 消息）。
# Telegram 只发一条：archive 阶段把「论文摘要 + 归档状态」合并后推送（推送移到 archive 之后）。
# 单 job 串行，selected_<today>.json 在同一 runner 磁盘上传递，无需 git 中转。
# 调度由 cron-job.org 打这个 workflow_dispatch 端点触发（不用 GH 自带 schedule）。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install package
        run: pip install -e ".[dev]"

      # 只抓取+精筛，不发 Telegram（合并消息在 archive 阶段统一推送），故无需 Telegram secrets。
      - name: Feed → curate
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: bio-2-info run-feed

      # archive 可能因 IMA 抖动失败；run-archive 已做容错：即使 IMA 异常也照常推送 digest
      # （归档状态标注为失败）并记 pushed_ledger，再以非零退出。continue-on-error 让后续 commit 仍落库。
      - name: Archive → IMA → combined Telegram
        id: archive
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IMA_CLIENT_ID: ${{ secrets.IMA_CLIENT_ID }}
          IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
          IMA_KB_NAME: 每日生信资讯
        run: bio-2-info run-archive

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-${{ github.run_id }}
          path: |
            data/digests/candidates_*.json
            data/digests/selected_*.json
            data/digests/digest_*.md
            data/digests/pushed_ledger.json
            data/digests/archived_ledger.json
          retention-days: 14

      # 即使 archive(IMA) 失败也要提交：run-archive 已先推 Telegram 并记 pushed_ledger，
      # 必须落库防止次日重复推送。
      - name: Commit selection + ledgers + site data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/digests/selected_*.json data/digests/pushed_ledger.json data/digests/archived_ledger.json
          git add docs/data/papers.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily $(date -u +%F)"
            git push
          else
            echo "No changes."
          fi

      # commit 之后再让 run 变红：archive(IMA) 失败时 CI 状态可见，但 feed 状态已落库。
      - name: Fail if archive failed
        if: steps.archive.outcome == 'failure'
        run: |
          echo "::error::archive step failed (see 'Archive selected → IMA → Telegram' logs)"
          exit 1
