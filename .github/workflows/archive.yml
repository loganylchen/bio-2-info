name: archive
# 归档当日 selected_*.json 到 IMA 并推送 Telegram，对应原 Hermes 09:15 cron 810217b594c8。
# 调度由 cron-job.org 打 workflow_dispatch 端点触发（不用 GH 自带 schedule，更可控）。
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run archive (selected → IMA → Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IMA_CLIENT_ID: ${{ secrets.IMA_CLIENT_ID }}
          IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
          IMA_KB_NAME: 每日生信资讯
        run: bio-2-info run-archive

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ github.run_id }}
          path: |
            data/digests/digest_*.md
            data/digests/archived_ledger.json
          retention-days: 30

      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digests/archived_ledger.json
          if ! git diff --cached --quiet -- data/digests; then
            git commit -m "chore: archive ledger $(date -u +%F) [skip ci]"
            git push
          else
            echo "No ledger changes."
          fi
